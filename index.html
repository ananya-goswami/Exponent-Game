<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exponent game</title>
  <link rel="stylesheet" href="CSS/styles.css" />
</head>
<body>
  <!-- Outer viewport wrapper. It holds the full-bleed scene backdrop (sky
       + ground) and the scaled game stage. The backdrop lives HERE — not
       inside the scaled stage — so it always covers the entire browser
       window, with no pillar/letterbox gutters at any aspect ratio. -->
  <div class="viewport" id="viewport">
    <!-- Full-bleed scene layers. They span the viewport, not the stage,
         so they stay edge-to-edge no matter how the stage is scaled. -->
    <div class="scene-sky"    aria-hidden="true"></div>
    <div class="scene-ground" aria-hidden="true"></div>

    <!-- Fixed-size 1280x720 stage. All game coordinates live inside here.
         The stage is transparent — clouds and UI sit on top of the
         viewport-level scene. -->
    <div class="stage" id="stage">

      <!-- Decorative drifting clouds built from the cloud sprite. -->
      <div class="clouds">
        <div class="cloud cloud--a"></div>
        <div class="cloud cloud--b"></div>
        <div class="cloud cloud--c"></div>
      </div>

      <!-- Top-center level banner (e.g. "Level 5 of 10 — Build 5²") -->
      <div class="level-banner" id="levelBanner">Level 1</div>

      <!-- Walking penguin (4-frame sprite). Triggered on correct answer. -->
      <div class="penguin-walker" id="penguinWalker" aria-hidden="true">
        <div class="penguin"></div>
      </div>

      <!-- LEFT SIDEBAR -->
      <aside class="sidebar">
        <!-- Orange x^2 logo badge -->
        <div class="avatar" aria-label="Exponents">x<sup>2</sup></div>

        <!-- Back arrow -->
        <button class="back-btn" title="Back" aria-label="Back">
          <span class="back-arrow"></span>
        </button>

        <!-- Vertical progress rail -->
        <div class="progress">
          <div class="progress__rail">
            <div class="progress__fill" id="progressFill"></div>
            <div class="progress__marker" id="progressMarker"></div>
          </div>
        </div>

        <!-- Infinity / level marker -->
        <div class="infinity" title="Endless mode">∞</div>
      </aside>

      <!-- Puzzle scene — direct children of the stage so they position
           against the full 1280x720 design space, not an inner wrapper. -->
      <div class="cluster cluster--source" id="sourceCluster"></div>
      <div class="big-arrow" aria-hidden="true"></div>
      <div class="cluster cluster--target" id="targetCluster"></div>
      <div class="target-label" id="targetLabel"></div>

      <!-- Floating multiplier chip that animates onto source on select.
           Lives directly under .stage so its pixel coords are stage-space. -->
      <div class="fly-chip" id="flyChip" aria-hidden="true"></div>

      <!-- ANSWER BAR (bottom center) -->
      <div class="answer-bar" id="answerBar">
        <div class="answer-bar__inner" id="answerInner">
          <!-- Filled at runtime: source dot + chips -->
        </div>
      </div>

      <!-- MULTIPLIER ROW -->
      <div class="multipliers" id="multipliers">
        <!-- Buttons injected by JS -->
      </div>

      <!-- GREEN ACTION BUTTON (lower-left) -->
      <button class="action-btn" id="actionBtn" title="Submit / Next">
        <span class="action-btn__icon" id="actionIcon"></span>
      </button>

      <!-- UNDO BUTTON (lower-right) -->
      <button class="undo-btn" id="undoBtn" title="Undo last" aria-label="Undo">
        <img class="undo-arrow" src="Assets/undo-svgrepo-com.svg" alt="" aria-hidden="true" draggable="false" />
      </button>

      <!-- Pause button (top of sidebar is occupied; place floating near top-right) -->
      <button class="pause-btn" id="pauseBtn" title="Pause" aria-label="Pause">
        <span></span><span></span>
      </button>

      <!-- TOAST for feedback -->
      <div class="toast" id="toast"></div>

      <!-- PAUSE MODAL -->
      <div class="modal" id="pauseModal" role="dialog" aria-hidden="true">
        <div class="modal__card">
          <h2 class="modal__title">Paused</h2>
          <button class="modal__btn modal__btn--primary" id="resumeBtn">Resume</button>
          <button class="modal__btn" id="restartBtn">Restart Level</button>
        </div>
      </div>

      <!-- GAME COMPLETE MODAL -->
      <div class="modal" id="completeModal" role="dialog" aria-hidden="true">
        <div class="modal__card">
          <h2 class="modal__title">Great Work!</h2>
          <p class="modal__sub">You finished every puzzle.</p>
          <button class="modal__btn modal__btn--primary" id="playAgainBtn">Play Again</button>
        </div>
      </div>

      <!-- FIRST-LOAD TUTORIAL MODAL -->
      <div class="modal" id="tutorialModal" role="dialog" aria-hidden="true">
        <div class="modal__card modal__card--tutorial">
          <h2 class="modal__title">How to play</h2>
          <ul class="tutorial__list">
            <li><span class="tutorial__icon">&times;</span>Tap a number to multiply</li>
            <li><span class="tutorial__icon">&#127919;</span>Reach the target to win</li>
            <li><span class="tutorial__icon">&#8630;</span>Use undo if you make a mistake</li>
          </ul>
          <button class="modal__btn modal__btn--primary" id="tutorialStartBtn">Got it!</button>
        </div>
      </div>

    </div>

    <!-- Full-viewport warm glow overlay that briefly lights up on a correct
         answer. Lives as a sibling of the stage so it covers the entire
         browser window (including pillar/letterbox), not just 1280x720. -->
    <div class="win-flash" id="winFlash" aria-hidden="true"></div>
  </div>

  <script src="JS/levels.js"></script>
  <script src="JS/script.js"></script>
</body>
</html>
